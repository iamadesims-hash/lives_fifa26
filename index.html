<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolapo Live • Real-Time Broadcast</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .live-dot { animation: pulse 2s infinite; }
    #player { background: #000; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <!-- Header -->
  <div class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-red-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl">📡</div>
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Dolapo Live</h1>
          <p class="text-emerald-400 text-sm flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 bg-emerald-500 rounded-full live-dot"></span>
            LIVE NOW
          </p>
        </div>
      </div>
      <div class="flex items-center gap-6 text-sm">
        <div class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-3xl">
          <i class="fa-solid fa-users"></i>
          <span id="viewer-count" class="font-medium">1,284</span> watching
        </div>
        <a href="https://x.com/iamadedsims17" target="_blank" 
           class="flex items-center gap-2 bg-[#1DA1F2] hover:bg-[#1a8cd8] px-6 py-2 rounded-3xl font-medium transition">
          <i class="fa-brands fa-x-twitter"></i>
          Follow on X
        </a>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8 grid lg:grid-cols-12 gap-8">
    <!-- Video Player -->
    <div class="lg:col-span-8">
      <div class="bg-black rounded-3xl overflow-hidden shadow-2xl border border-zinc-800">
        <video id="player" class="w-full aspect-video" controls autoplay muted></video>
      </div>

      <!-- Stream URL input (for easy testing) -->
      <div class="mt-4 bg-zinc-900 rounded-3xl p-4 flex gap-3 items-center">
        <input id="stream-url" type="text" 
               class="flex-1 bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-3 text-sm focus:outline-none focus:border-emerald-500"
               placeholder="Paste your HLS (.m3u8) stream URL here">
        <button onclick="loadStream()" 
                class="bg-emerald-500 hover:bg-emerald-600 px-8 py-3 rounded-3xl font-medium transition">
          Load Live Stream
        </button>
      </div>

      <div class="mt-6 flex items-center justify-between text-sm">
        <div class="flex items-center gap-4">
          <div class="flex items-center gap-2 text-emerald-400">
            <i class="fa-solid fa-circle"></i>
            <span class="font-medium">LIVE</span>
          </div>
          <div class="text-zinc-400">Dolapo Olayinka • FIFA World Cup 2026 Special Broadcast</div>
        </div>
        <button onclick="shareToX()" 
                class="flex items-center gap-2 text-[#1DA1F2] hover:text-white transition">
          <i class="fa-brands fa-x-twitter"></i>
          <span class="font-medium">Share this live to X</span>
        </button>
      </div>
    </div>

    <!-- Sidebar: X Space + Live Chat -->
    <div class="lg:col-span-4 space-y-6">
      <!-- X Space Integration -->
      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
        <div class="flex items-center gap-3 mb-4">
          <i class="fa-solid fa-microphone-lines text-purple-400 text-2xl"></i>
          <div>
            <h3 class="font-semibold text-lg">Join the LIVE X Space</h3>
            <p class="text-zinc-400 text-sm">Audio discussion • Real-time Q&amp;A</p>
          </div>
        </div>
        <a id="space-link" href="https://x.com/i/spaces/YOUR_SPACE_ID_HERE" target="_blank"
           class="block w-full bg-purple-600 hover:bg-purple-700 text-center py-4 rounded-3xl font-medium transition flex items-center justify-center gap-2">
          <i class="fa-solid fa-headset"></i>
          ENTER X SPACE NOW
        </a>
        <p class="text-xs text-zinc-500 mt-4 text-center">Space link updates automatically when you go live</p>
      </div>

      <!-- Live Chat (demo - real chat needs backend) -->
      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800 h-[420px] flex flex-col">
        <h3 class="font-semibold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-comments"></i>
          Live Chat
        </h3>
        <div id="chat-messages" class="flex-1 overflow-y-auto text-sm space-y-4 pr-2"></div>
        <div class="flex mt-4">
          <input id="chat-input" type="text" placeholder="Type a message..." 
                 class="flex-1 bg-zinc-800 border border-zinc-700 rounded-l-3xl px-5 py-3 text-sm focus:outline-none">
          <button onclick="sendChatMessage()" 
                  class="bg-white text-zinc-950 px-8 rounded-r-3xl font-medium">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Tailwind script already loaded
    function loadStream() {
      const urlInput = document.getElementById('stream-url').value.trim();
      const video = document.getElementById('player');
      
      if (!urlInput) {
        alert('Please paste a valid HLS (.m3u8) stream URL');
        return;
      }

      if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(urlInput);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
      } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = urlInput;
        video.play();
      } else {
        alert('Your browser does not support HLS streaming');
      }
      
      // Auto-update viewer count (demo)
      let count = 1284;
      setInterval(() => {
        count += Math.floor(Math.random() * 12) + 3;
        document.getElementById('viewer-count').textContent = count.toLocaleString();
      }, 8000);
    }

    // Demo chat
    function sendChatMessage() {
      const input = document.getElementById('chat-input');
      if (!input.value.trim()) return;
      
      const msgDiv = document.createElement('div');
      msgDiv.className = 'flex gap-3';
      msgDiv.innerHTML = `
        <div class="w-8 h-8 bg-zinc-700 rounded-2xl flex-shrink-0"></div>
        <div>
          <div class="text-emerald-400 text-xs">@you • just now</div>
          <div class="text-zinc-100">${input.value}</div>
        </div>
      `;
      document.getElementById('chat-messages').appendChild(msgDiv);
      input.value = '';
      // Scroll to bottom
      const chat = document.getElementById('chat-messages');
      chat.scrollTop = chat.scrollHeight;
    }

    // Share to X
    function shareToX() {
      const text = encodeURIComponent("I'm live right now! Join the X Space + watch the professional stream 👉 ");
      const url = encodeURIComponent(window.location.href);
      window.open(`https://x.com/intent/tweet?text=${text}&url=${url}`, '_blank');
    }

    // Demo chat messages on load
    window.onload = () => {
      const demoMessages = [
        {user: "@footballfan_ng", msg: "Argentina or France this year? 🔥"},
        {user: "@dami_lukman", msg: "This broadcast is clean! 🇳🇬"},
        {user: "@worldcup2026", msg: "When does the Space start?"}
      ];
      demoMessages.forEach(m => {
        const div = document.createElement('div');
        div.className = 'flex gap-3';
        div.innerHTML = `
          <div class="w-8 h-8 bg-zinc-700 rounded-2xl flex-shrink-0"></div>
          <div>
            <div class="text-emerald-400 text-xs">${m.user} • just now</div>
            <div class="text-zinc-100">${m.msg}</div>
          </div>
        `;
        document.getElementById('chat-messages').appendChild(div);
      });
    };
  </script>
</body>
</html>
