<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolapo Live • Powered by Mux</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .live-dot { animation: pulse 2s infinite; }
    mux-player { width: 100%; aspect-ratio: 16/9; background: #000; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-red-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl">📡</div>
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Dolapo Live</h1>
          <p class="text-emerald-400 text-sm flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 bg-emerald-500 rounded-full live-dot"></span>
            LIVE via Mux • Secure Proxy
          </p>
        </div>
      </div>
      <div class="flex items-center gap-6 text-sm">
        <div class="flex items-center gap-2 bg-zinc-900 px-4 py-2 rounded-3xl">
          <i class="fa-solid fa-users"></i>
          <span id="viewer-count" class="font-medium">1,284</span> watching
        </div>
        <a href="https://x.com/iamadedsims17" target="_blank" class="flex items-center gap-2 bg-[#1DA1F2] hover:bg-[#1a8cd8] px-6 py-2 rounded-3xl font-medium transition">
          <i class="fa-brands fa-x-twitter"></i> Follow on X
        </a>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8 grid lg:grid-cols-12 gap-8">
    <div class="lg:col-span-8 space-y-6">
      <div class="bg-black rounded-3xl overflow-hidden shadow-2xl border border-zinc-800">
        <mux-player id="mux-player" stream-type="live" playback-id="" env-key="YOUR_MUX_ENV_KEY_HERE" muted auto-play></mux-player>
      </div>

      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
        <h3 class="font-semibold text-lg mb-4 flex items-center gap-2">
          <i class="fa-solid fa-plus"></i> Create New Mux Live Stream
        </h3>
        <button onclick="createLiveStreamProxy()" 
                class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-3xl font-medium transition flex items-center justify-center gap-2">
          <i class="fa-solid fa-bolt"></i>
          CREATE LIVE STREAM (Secure Backend)
        </button>
      </div>

      <div id="stream-details" class="hidden bg-zinc-900 rounded-3xl p-6 border border-emerald-500">
        <h4 class="font-semibold mb-4">Live Stream Created Successfully</h4>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between"><span class="text-zinc-400">Playback ID:</span> <span id="display-playback-id" class="font-mono"></span></div>
          <div class="flex justify-between"><span class="text-zinc-400">RTMP URL:</span> <span id="display-rtmp" class="font-mono"></span></div>
          <div class="flex justify-between"><span class="text-zinc-400">Stream Key:</span> <span id="display-key" class="font-mono"></span></div>
          <div class="flex justify-between"><span class="text-zinc-400">Status:</span> <span id="display-status" class="text-emerald-400"></span></div>
        </div>
        <div class="flex gap-3 mt-6">
          <button onclick="copyToClipboard('rtmp')" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-3xl text-sm">Copy RTMP</button>
          <button onclick="copyToClipboard('key')" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-3xl text-sm">Copy Key</button>
          <button onclick="loadCreatedStream()" class="flex-1 bg-emerald-500 hover:bg-emerald-600 py-3 rounded-3xl text-sm">Load in Player</button>
        </div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="lg:col-span-4 space-y-6">
      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
        <div class="flex items-center gap-3 mb-4">
          <i class="fa-solid fa-microphone-lines text-purple-400 text-2xl"></i>
          <div>
            <h3 class="font-semibold text-lg">Join the LIVE X Space</h3>
            <p class="text-zinc-400 text-sm">Audio + real-time chat</p>
          </div>
        </div>
        <a id="space-link" href="https://x.com/i/spaces/YOUR_SPACE_ID_HERE" target="_blank"
           class="block w-full bg-purple-600 hover:bg-purple-700 text-center py-4 rounded-3xl font-medium transition flex items-center justify-center gap-2">
          <i class="fa-solid fa-headset"></i> ENTER X SPACE NOW
        </a>
      </div>

      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800 h-[420px] flex flex-col">
        <h3 class="font-semibold mb-4 flex items-center gap-2"><i class="fa-solid fa-comments"></i> Live Chat</h3>
        <div id="chat-messages" class="flex-1 overflow-y-auto text-sm space-y-4 pr-2"></div>
        <div class="flex mt-4">
          <input id="chat-input" type="text" placeholder="Type a message..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-l-3xl px-5 py-3 text-sm focus:outline-none">
          <button onclick="sendChatMessage()" class="bg-white text-zinc-950 px-8 rounded-r-3xl font-medium">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentStreamData = null;

    async function createLiveStreamProxy() {
      try {
        const response = await fetch('/api/create-stream', { method: 'POST' });
        if (!response.ok) throw new Error('Failed to create stream');
        
        const data = await response.json();
        currentStreamData = data;

        document.getElementById('display-playback-id').textContent = data.playbackId;
        document.getElementById('display-rtmp').textContent = data.rtmpUrl;
        document.getElementById('display-key').textContent = data.streamKey;
        document.getElementById('display-status').textContent = 'READY';

        document.getElementById('stream-details').classList.remove('hidden');
        alert('✅ Live stream created! Copy details and start streaming from OBS.');
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function loadCreatedStream() {
      if (!currentStreamData) return;
      document.getElementById('mux-player').setAttribute('playback-id', currentStreamData.playbackId);
    }

    function copyToClipboard(type) {
      let text = type === 'rtmp' ? document.getElementById('display-rtmp').textContent : document.getElementById('display-key').textContent;
      navigator.clipboard.writeText(text);
      alert('✅ Copied!');
    }

    function sendChatMessage() {
      const input = document.getElementById('chat-input');
      if (!input.value.trim()) return;
      const msgDiv = document.createElement('div');
      msgDiv.className = 'flex gap-3';
      msgDiv.innerHTML = `
        <div class="w-8 h-8 bg-zinc-700 rounded-2xl flex-shrink-0"></div>
        <div>
          <div class="text-emerald-400 text-xs">@you • just now</div>
          <div class="text-zinc-100">${input.value}</div>
        </div>
      `;
      document.getElementById('chat-messages').appendChild(msgDiv);
      input.value = '';
      const chat = document.getElementById('chat-messages');
      chat.scrollTop = chat.scrollHeight;
    }

    let count = 1284;
    setInterval(() => {
      count += Math.floor(Math.random() * 15) + 5;
      document.getElementById('viewer-count').textContent = count.toLocaleString();
    }, 7000);

    window.onload = () => {
      const demoMessages = [
        {user: "@footballfan_ng", msg: "Stream created instantly!"},
        {user: "@dami_lukman", msg: "Ready for World Cup broadcast 🇳🇬"}
      ];
      demoMessages.forEach(m => {
        const div = document.createElement('div');
        div.className = 'flex gap-3';
        div.innerHTML = `
          <div class="w-8 h-8 bg-zinc-700 rounded-2xl flex-shrink-0"></div>
          <div>
            <div class="text-emerald-400 text-xs">${m.user} • just now</div>
            <div class="text-zinc-100">${m.msg}</div>
          </div>
        `;
        document.getElementById('chat-messages').appendChild(div);
      });
    };
  </script>
</body>
</html>
