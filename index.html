<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolapo Live • Powered by Mux</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .live-dot { animation: pulse 2s infinite; }
    mux-player { width: 100%; aspect-ratio: 16/9; background: #000; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <!-- Header -->
  <div class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-red-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl">📡</div>
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Dolapo Live</h1>
          <p class="text-emerald-400 text-sm flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 bg-emerald-500 rounded-full live-dot"></span>
            LIVE • <span id="online-count">0</span> online
          </p>
        </div>
      </div>
      <div class="flex items-center gap-6 text-sm">
        <div onclick="showProfileModal()" class="cursor-pointer flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-3xl">
          <i class="fa-solid fa-user"></i>
          <span id="current-username">Guest</span>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8 grid lg:grid-cols-12 gap-8">
    <div class="lg:col-span-8 space-y-6">
      <!-- Mux Player + Create Stream (unchanged) -->
      <div class="bg-black rounded-3xl overflow-hidden shadow-2xl border border-zinc-800">
        <mux-player id="mux-player" stream-type="live" playback-id="" env-key="YOUR_MUX_ENV_KEY_HERE" muted auto-play></mux-player>
      </div>

      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
        <button onclick="createLiveStreamProxy()" class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-3xl font-medium transition flex items-center justify-center gap-2">
          <i class="fa-solid fa-bolt"></i> CREATE LIVE STREAM (Secure)
        </button>
      </div>

      <div id="stream-details" class="hidden bg-zinc-900 rounded-3xl p-6 border border-emerald-500">
        <!-- Stream details content (same as before) -->
      </div>
    </div>

    <!-- Sidebar -->
    <div class="lg:col-span-4 space-y-6">
      <!-- X Space -->
      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
        <a id="space-link" href="https://x.com/i/spaces/YOUR_SPACE_ID_HERE" target="_blank" class="block w-full bg-purple-600 hover:bg-purple-700 text-center py-4 rounded-3xl font-medium transition">
          ENTER X SPACE NOW
        </a>
      </div>

      <!-- Chat -->
      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800 h-[520px] flex flex-col">
        <h3 class="font-semibold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-comments"></i> Live Chat
          <span id="online-users" class="ml-auto text-emerald-400 text-xs"></span>
        </h3>
        <div id="chat-messages" class="flex-1 overflow-y-auto text-sm space-y-4 pr-2"></div>
        <div id="typing-indicator" class="text-xs text-emerald-400 h-5 px-2"></div>
        <div class="flex mt-2 gap-2">
          <input id="chat-input" type="text" placeholder="Type a message..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-l-3xl px-5 py-3 text-sm" onkeydown="handleTyping(event)">
          <button onclick="sendChatMessage()" class="bg-white text-zinc-950 px-8 rounded-r-3xl font-medium">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Profile Modal (same) -->
  <div id="profile-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <!-- Modal content (same as previous) -->
  </div>

  <script>
    // === Fixed & Proper Supabase Client Initialization ===
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true }
    });

    let currentUser = null;
    let username = 'Guest';
    let presenceChannel = null;
    let onlineUsers = new Set();

    // Auth
    async function initAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        const { data } = await supabase.auth.signInAnonymously({ options: { data: { display_name: username } } });
        currentUser = data.user;
      } else {
        currentUser = session.user;
      }
      username = currentUser?.user_metadata?.display_name || `Fan_${Math.floor(Math.random()*9999)}`;
      document.getElementById('current-username').textContent = username;
    }

    // === Supabase Presence for Online Users ===
    function setupPresence() {
      presenceChannel = supabase.channel('live-room');

      presenceChannel
        .on('presence', { event: 'sync' }, () => {
          const state = presenceChannel.presenceState();
          onlineUsers.clear();
          Object.values(state).forEach(presences => {
            presences.forEach(p => onlineUsers.add(p.username));
          });
          document.getElementById('online-users').textContent = `${onlineUsers.size} online`;
          document.getElementById('online-count').textContent = onlineUsers.size;
        })
        .on('presence', { event: 'join' }, ({ key, newPresences }) => {
          newPresences.forEach(p => onlineUsers.add(p.username));
          document.getElementById('online-users').textContent = `${onlineUsers.size} online`;
        })
        .on('presence', { event: 'leave' }, ({ key, leftPresences }) => {
          leftPresences.forEach(p => onlineUsers.delete(p.username));
          document.getElementById('online-users').textContent = `${onlineUsers.size} online`;
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await presenceChannel.track({ username: username, online_at: new Date().toISOString() });
          }
        });
    }

    // Chat functions (send, load, subscribe) — same as before with minor improvements
    async function sendChatMessage() { /* ... */ }
    async function loadInitialMessages() { /* ... */ }
    function subscribeToChat() { /* ... */ }

    // Typing (unchanged)
    function handleTyping(e) { /* ... */ }

    // Mux functions (unchanged)
    let currentStreamData = null;
    async function createLiveStreamProxy() { /* ... */ }
    function loadCreatedStream() { /* ... */ }
    function copyToClipboard(type) { /* ... */ }

    // Profile modal functions
    function showProfileModal() { /* ... */ }
    async function updateDisplayName() { /* ... */ }

    window.onload = async () => {
      await initAuth();
      await loadInitialMessages();
      subscribeToChat();
      setupPresence();           // ← New Presence
    };
  </script>
</body>
</html>
