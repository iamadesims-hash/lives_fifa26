<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolapo Live • Powered by Mux</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .live-dot { animation: pulse 2s infinite; }
    mux-player { width: 100%; aspect-ratio: 16/9; background: #000; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <!-- Header -->
  <div class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-red-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl">📡</div>
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Dolapo Live</h1>
          <p class="text-emerald-400 text-sm flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 bg-emerald-500 rounded-full live-dot"></span>
            LIVE • <span id="online-count">0</span> online
          </p>
        </div>
      </div>
      <div onclick="showProfileModal()" class="cursor-pointer flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-3xl">
        <i class="fa-solid fa-user"></i>
        <span id="current-username">Guest</span>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8 grid lg:grid-cols-12 gap-8">
    <div class="lg:col-span-8 space-y-6">
      <div class="bg-black rounded-3xl overflow-hidden shadow-2xl border border-zinc-800">
        <mux-player 
          id="mux-player" 
          stream-type="live" 
          playback-id="" 
          env-key="YOUR_MUX_ENV_KEY_HERE"
          muted 
          auto-play>
        </mux-player>
      </div>

      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
        <button onclick="createLiveStreamProxy()" 
                class="w-full bg-emerald-500 hover:bg-emerald-600 py-4 rounded-3xl font-medium transition flex items-center justify-center gap-2">
          <i class="fa-solid fa-bolt"></i> CREATE LIVE STREAM (Secure)
        </button>
      </div>

      <!-- Mux Analytics Summary -->
      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800 text-sm">
        <h4 class="font-semibold mb-3">Mux Video Analytics (Live)</h4>
        <p class="text-zinc-400">View full QoE, viewer engagement, rebuffering, and startup time in your <a href="https://data.mux.com" target="_blank" class="text-emerald-400 underline">Mux Data Dashboard</a>.</p>
        <div id="mux-stats" class="mt-4 text-xs text-zinc-500">Waiting for stream...</div>
      </div>

      <div id="stream-details" class="hidden bg-zinc-900 rounded-3xl p-6 border border-emerald-500">
        <!-- Stream details populated by createLiveStreamProxy -->
      </div>
    </div>

    <!-- Sidebar -->
    <div class="lg:col-span-4 space-y-6">
      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
        <a id="space-link" href="https://x.com/i/spaces/YOUR_SPACE_ID_HERE" target="_blank"
           class="block w-full bg-purple-600 hover:bg-purple-700 text-center py-4 rounded-3xl font-medium transition">
          ENTER X SPACE NOW
        </a>
      </div>

      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800 h-[520px] flex flex-col">
        <h3 class="font-semibold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-comments"></i> Live Chat 
          <span id="online-users" class="ml-auto text-emerald-400 text-xs"></span>
        </h3>
        <div id="chat-messages" class="flex-1 overflow-y-auto text-sm space-y-4 pr-2"></div>
        <div id="typing-indicator" class="text-xs text-emerald-400 h-5 px-2"></div>
        <div class="flex mt-2 gap-2">
          <input id="chat-input" type="text" placeholder="Type a message..." 
                 class="flex-1 bg-zinc-800 border border-zinc-700 rounded-l-3xl px-5 py-3 text-sm" 
                 onkeydown="handleTyping(event)">
          <button onclick="sendChatMessage()" class="bg-white text-zinc-950 px-8 rounded-r-3xl font-medium">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profile-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-sm">
      <h3 class="text-xl font-semibold mb-6">Your Profile</h3>
      <input id="display-name" type="text" placeholder="Display name" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-3 text-sm mb-6">
      <div class="flex gap-3">
        <button onclick="updateDisplayName()" class="flex-1 bg-emerald-500 py-3 rounded-3xl">Save</button>
        <button onclick="hideProfileModal()" class="flex-1 bg-zinc-800 py-3 rounded-3xl">Close</button>
      </div>
    </div>
  </div>

  <script>
    // Supabase Client (robust initialization)
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: true, autoRefreshToken: true },
      realtime: { params: { heartbeat: 20000 } }
    });

    let currentUser = null;
    let username = 'Guest';
    let presenceChannel = null;
    let currentStreamData = null;

    // Auth
    async function initAuth() {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) {
        const { data } = await supabase.auth.signInAnonymously({
          options: { data: { display_name: username } }
        });
        currentUser = data.user;
      } else {
        currentUser = session.user;
      }
      username = currentUser?.user_metadata?.display_name || `Fan_${Math.floor(Math.random()*9999)}`;
      document.getElementById('current-username').textContent = username;
    }

    // Presence with Heartbeats
    function setupPresence() {
      presenceChannel = supabase.channel('live-room', { config: { presence: { key: currentUser?.id } } });

      presenceChannel
        .on('presence', { event: 'sync' }, () => {
          const state = presenceChannel.presenceState();
          const users = new Set(Object.values(state).flat().map(p => p.username));
          document.getElementById('online-users').textContent = `${users.size} online`;
          document.getElementById('online-count').textContent = users.size;
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await presenceChannel.track({ username, online_at: new Date().toISOString() });
          }
        });
    }

    // === Full Chat Functions ===
    async function sendChatMessage() {
      const input = document.getElementById('chat-input');
      const message = input.value.trim();
      if (!message) return;

      const { error } = await supabase.from('chat_messages').insert({ message, username });
      if (error) console.error(error);
      input.value = '';
    }

    async function loadInitialMessages() {
      const { data } = await supabase.from('chat_messages').select('*').order('created_at', { ascending: true }).limit(50);
      const container = document.getElementById('chat-messages');
      data.forEach(msg => addMessageToUI(msg));
      container.scrollTop = container.scrollHeight;
    }

    function addMessageToUI(msg) {
      const div = document.createElement('div');
      div.className = 'flex gap-3';
      div.innerHTML = `
        <div class="w-8 h-8 bg-zinc-700 rounded-2xl flex-shrink-0"></div>
        <div>
          <div class="text-emerald-400 text-xs">@${msg.username}</div>
          <div class="text-zinc-100">${msg.message}</div>
        </div>
      `;
      document.getElementById('chat-messages').appendChild(div);
    }

    function subscribeToChat() {
      supabase.channel('chat-room')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, (payload) => {
          addMessageToUI(payload.new);
          const container = document.getElementById('chat-messages');
          container.scrollTop = container.scrollHeight;
        })
        .subscribe();
    }

    // === Typing Indicators ===
    let typingTimeout = null;
    function handleTyping(e) {
      if (e.key === 'Enter') {
        sendChatMessage();
        return;
      }
      if (presenceChannel) {
        presenceChannel.send({
          type: 'broadcast',
          event: 'typing',
          payload: { username }
        });
      }
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {}, 1500);
    }

    // === Mux Functions ===
    async function createLiveStreamProxy() {
      try {
        const response = await fetch('/api/create-stream', { method: 'POST' });
        if (!response.ok) throw new Error('Failed');
        const data = await response.json();
        currentStreamData = data;
        // Populate details...
        document.getElementById('stream-details').classList.remove('hidden');
      } catch (err) {
        alert('Error creating stream');
      }
    }

    function loadCreatedStream() {
      if (currentStreamData) {
        document.getElementById('mux-player').setAttribute('playback-id', currentStreamData.playbackId);
      }
    }

    function copyToClipboard(type) { /* ... */ }

    // Profile modal functions
    function showProfileModal() { /* ... */ }
    async function updateDisplayName() { /* ... */ }
    function hideProfileModal() { /* ... */ }

    // Init
    window.onload = async () => {
      await initAuth();
      await loadInitialMessages();
      subscribeToChat();
      setupPresence();
    };
  </script>
</body>
</html>
