<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dolapo Live • Powered by Mux</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    body { font-family: 'Inter', system_ui, sans-serif; }
    .live-dot { animation: pulse 2s infinite; }
    mux-player { width: 100%; aspect-ratio: 16/9; background: #000; }
    .avatar { width: 32px; height: 32px; border-radius: 9999px; object-fit: cover; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <!-- Header -->
  <div class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 bg-red-600 rounded-2xl flex items-center justify-center text-white font-bold text-xl">📡</div>
        <div>
          <h1 class="text-2xl font-semibold tracking-tight">Dolapo Live</h1>
          <p class="text-emerald-400 text-sm flex items-center gap-1.5">
            <span class="inline-block w-3 h-3 bg-emerald-500 rounded-full live-dot"></span>
            LIVE • <span id="online-count">0</span> online
          </p>
        </div>
      </div>
      <div onclick="showProfileModal()" class="cursor-pointer flex items-center gap-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-3xl">
        <i class="fa-solid fa-user"></i>
        <span id="current-username">Guest</span>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-8 grid lg:grid-cols-12 gap-8">
    <div class="lg:col-span-8 space-y-6">
      <div class="bg-black rounded-3xl overflow-hidden shadow-2xl border border-zinc-800 relative">
        <mux-player id="mux-player" stream-type="live" playback-id="" env-key="YOUR_MUX_ENV_KEY_HERE" muted auto-play></mux-player>
        <div id="live-overlay" class="hidden absolute top-4 right-4 bg-red-600 text-white text-xs px-4 py-1.5 rounded-full font-medium flex items-center gap-2">
          <span class="relative flex h-3 w-3">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-3 w-3 bg-red-500"></span>
          </span>
          LIVE NOW
        </div>
      </div>

      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
        <div class="flex gap-3">
          <button onclick="createDemoStream()" class="flex-1 bg-zinc-700 hover:bg-zinc-600 py-4 rounded-3xl font-medium transition">
            Create Demo Stream
          </button>
          <button onclick="goLiveSimulation()" class="flex-1 bg-red-600 hover:bg-red-700 py-4 rounded-3xl font-medium transition flex items-center justify-center gap-2">
            <i class="fa-solid fa-play"></i> GO LIVE (Simulation)
          </button>
        </div>
      </div>

      <div id="stream-details" class="hidden bg-zinc-900 rounded-3xl p-6 border border-emerald-500"></div>
    </div>

    <!-- Sidebar with Chat -->
    <div class="lg:col-span-4 space-y-6">
      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
        <a id="space-link" href="https://x.com/i/spaces/YOUR_SPACE_ID_HERE" target="_blank" class="block w-full bg-purple-600 hover:bg-purple-700 text-center py-4 rounded-3xl font-medium transition flex items-center justify-center gap-2">
          <i class="fa-solid fa-headset"></i> ENTER X SPACE NOW
        </a>
      </div>

      <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800 h-[520px] flex flex-col">
        <h3 class="font-semibold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-comments"></i> Live Chat 
          <span id="online-users" class="ml-auto text-emerald-400 text-xs"></span>
        </h3>
        <div id="chat-messages" class="flex-1 overflow-y-auto text-sm space-y-4 pr-2"></div>
        <div id="typing-indicator" class="text-xs text-emerald-400 h-5 px-2"></div>
        <div class="flex mt-2 gap-2">
          <input id="chat-input" type="text" placeholder="Type a message..." class="flex-1 bg-zinc-800 border border-zinc-700 rounded-l-3xl px-5 py-3 text-sm" onkeydown="handleTyping(event)">
          <button onclick="sendChatMessage()" class="bg-white text-zinc-950 px-8 rounded-r-3xl font-medium">Send</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Profile Modal -->
  <div id="profile-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-sm">
      <h3 class="text-xl font-semibold mb-6">Your Profile</h3>
      <div class="flex flex-col items-center mb-6">
        <img id="modal-avatar" src="https://via.placeholder.com/80" class="w-20 h-20 rounded-full object-cover mb-4 border-2 border-zinc-700">
        <label class="cursor-pointer bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-3xl text-sm">Upload Avatar
          <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="uploadAvatar(event)">
        </label>
      </div>
      <input id="display-name" type="text" placeholder="Display name" class="w-full bg-zinc-800 border border-zinc-700 rounded-3xl px-5 py-3 text-sm mb-6">
      <div class="flex gap-3">
        <button onclick="updateDisplayName()" class="flex-1 bg-emerald-500 py-3 rounded-3xl">Save</button>
        <button onclick="hideProfileModal()" class="flex-1 bg-zinc-800 py-3 rounded-3xl">Close</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'YOUR_SUPABASE_URL';
    const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      realtime: { params: { heartbeat: 15000 } }
    });

    let currentUser = null;
    let username = 'Guest';
    let avatarUrl = null;
    let presenceChannel = null;
    let typingTimeout = null;
    let currentStreamData = null;

    // === Supabase Realtime Listener for Mux Live Status ===
    function setupLiveStatusListener() {
      supabase.channel('live-status')
        .on('broadcast', { event: 'stream_status' }, (payload) => {
          const { type, playback_id } = payload.payload;

          if (type === 'video.live_stream.active') {
            document.getElementById('live-overlay').classList.remove('hidden');
            if (playback_id) {
              document.getElementById('mux-player').setAttribute('playback-id', playback_id);
            }
            console.log("🔴 Mux Webhook: Stream is LIVE!");
          } 
          else if (type === 'video.live_stream.idle') {
            document.getElementById('live-overlay').classList.add('hidden');
          }
        })
        .subscribe();
    }

    // Rest of your functions (initAuth, setupPresence, chat, avatar, typing, etc.)
    // ... (include all functions from previous version)

    async function initAuth() { /* same */ }
    async function uploadAvatar(e) { /* same */ }
    function setupPresence() { /* same */ }
    async function sendChatMessage() { /* same */ }
    async function loadInitialMessages() { /* same */ }
    function addMessageToUI(msg) { /* same */ }
    function subscribeToChat() { /* same */ }
    function handleTyping(e) { /* same */ }

    function createDemoStream() { /* same as previous */ }
    function goLiveSimulation() { /* same as previous */ }

    function showProfileModal() { /* same */ }
    function hideProfileModal() { /* same */ }
    async function updateDisplayName() { /* same */ }

    window.onload = async () => {
      await initAuth();
      await loadInitialMessages();
      subscribeToChat();
      setupPresence();
      setupLiveStatusListener();        // ← New Mux Webhook Listener
    };
  </script>
</body>
</html>
